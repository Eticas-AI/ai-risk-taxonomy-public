  label: Right to explanation and contestation
  definition: The risk that affected individuals are not informed about decisions taken with AI assistance,
    do not receive a meaningful explanation of those decisions, or have no effective channel to challenge
    or appeal them. Includes obligations under GDPR Article 22 (rights regarding automated individual
