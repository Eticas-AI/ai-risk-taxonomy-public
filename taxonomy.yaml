- id: privacy-confidentiality
  type: category
  label: Privacy & Confidentiality
  alt_labels:
  - Privacy
  - Data Privacy
  definition: 'The risk that an AI system collects, processes, or infers personal information in ways
    that infringe on individuals'' rights to control their data (privacy), or that sensitive information
    is exposed, accessed, or shared without authorization (confidentiality). This includes risks from
    data leakage, re-identification, unauthorized use, or insufficient safeguards.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: rights & ethics
  mappings:
  - framework: mit
    target_id: subdomain-2.1
    target_label: Compromise of privacy by obtaining, leaking or correctly inferring sensitive information
    relation: closeMatch
    citation: Privacy risks from data collection, model memorisation, and inference attacks that expose
      sensitive personal information.
  - framework: nist_600
    target_id: data-privacy
    target_label: Data Privacy
    relation: closeMatch
    citation: Data privacy risks including unauthorized access, collection, and inference of personal
      data by AI systems.
  - framework: nist_rmf
    target_id: privacy-enhanced
    target_label: Privacy-Enhanced
    relation: closeMatch
    citation: Privacy values including data minimisation, consent, and de-identification throughout the
      AI lifecycle.
  - framework: oecd
    target_id: principle-1.2
    target_label: Human rights, rule of law, fairness & privacy
    relation: broadMatch
    citation: Principle 1.2 covers privacy alongside human rights and fairness concerns.
  - framework: dpv_ai
    target_id: PersonalDataHandling
    target_label: Personal Data Handling (DPV core)
    relation: broadMatch
    target_url: https://w3c.github.io/dpv/2.3/dpv/#PersonalDataHandling
    citation: Personal Data Handling as defined in DPV core; broader than AI-specific privacy risks.
  - framework: eu_ai_act
    target_id: article-10-5-recital-47
    target_label: Article 10(5) — special categories of personal data + Recital 47 (fundamental rights
      including privacy)
    relation: closeMatch
    citation: Art. 10(5) on special categories of personal data; Recital 47 on fundamental rights including
      privacy.
  - framework: iso_42001
    target_id: A.7.5
    target_label: Privacy considerations for AI systems
    relation: closeMatch
    citation: A.7.5 establishes privacy considerations specific to AI system data processing.
  - framework: aiuc1
    target_id: A
    target_label: Data & Privacy domain
    relation: exactMatch
    citation: Domain A covers data and privacy comprehensively; exactMatch at category level.
  - framework: air_2024
    target_id: L2-Privacy
    target_label: Legal & Rights → Privacy (Unauthorized Privacy Violations × Sensitive Data types)
    relation: broadMatch
    citation: AIR structures privacy under Legal & Rights-Related Risks with granular violation types.
  - framework: ibm_atlas
    target_id: input-output-privacy
    target_label: Input → Data privacy + Output → Privacy violations
    relation: closeMatch
    citation: IBM Atlas covers privacy at both Input (data privacy) and Output (privacy violations) stages.
  - framework: tc260
    target_id: 3.1.2a-3.1.2d
    target_label: §3.1.2(a) Data risks — collection without consent + §3.1.2(d) Data risks — PII leaks
    relation: closeMatch
    citation: TC260 identifies data collection without consent and PII leak risks under Endogenous Data
      Risks.
  - framework: coe_ai_convention
    target_id: article-11
    target_label: Article 11 — Privacy and personal data protection
    relation: closeMatch
    citation: The Convention requires protection of privacy and personal data throughout the AI lifecycle.
  - framework: ieee_7002
    target_id: standard
    target_label: IEEE 7002-2022 (whole standard)
    relation: closeMatch
    citation: Systems-engineering process for privacy-oriented considerations across the development lifecycle,
      with procedures, diagrams and checklists for conformity assessment, and PIAs as the identification
      tool.
- id: privacy-collection-use
  type: subgroup
  broader: privacy-confidentiality
  label: Data collection & use
  definition: Risks from how personal data is collected, processed, and repurposed.
  mappings:
  - framework: dpv_ai
    target_id: PersonalDataCollection
    target_label: Personal Data Handling
    target_url: https://w3c.github.io/dpv/2.3/ai/#PersonalDataHandling
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-5
    target_label: Article 5 — Prohibited AI practices (emotion recognition, biometric categorization)
    relation: relatedMatch
- id: unlawful-data-processing
  type: subcategory
  broader: privacy-collection-use
  maturity: established
  label: Unlawful collection or processing of personal data
  definition: 'Collection, storage, or processing of personal data without adequate legal basis, consent,
    or compliance with applicable data protection regulations.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  mappings:
  - framework: eu_ai_act
    target_id: article-10
    target_label: Article 10 — data and data governance
    relation: closeMatch
  - framework: dpv_ai
    target_id: PersonalDataHandling
    target_label: Personal Data Handling
    relation: closeMatch
  - framework: air_2024
    target_id: L3-UnauthorizedPrivacyViolations
    target_label: Privacy → Unauthorized Privacy Violations
    relation: closeMatch
- id: function-creep
  type: subcategory
  broader: privacy-collection-use
  maturity: established
  label: Function creep
  definition: 'Repurposing of personal data beyond the original intent or consent scope, including secondary
    uses not anticipated at collection time.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  mappings:
  - framework: dpv_ai
    target_id: PersonalDataHandling
    target_label: Personal Data Handling (purpose limitation)
    relation: relatedMatch
  - framework: iso_42001
    target_id: A.6.2.2
    target_label: Documented intended use
    relation: closeMatch
- id: inference-based-profiling
  type: subcategory
  broader: privacy-collection-use
  maturity: established
  label: Inference-based profiling of sensitive attributes
  definition: 'Inference of sensitive attributes or characteristics — emotional states, political opinions,
    sexual orientation, health status, and similar — from behavioural, interaction, or other proxy data
    the individual did not directly disclose. Generalises the former emotion-inference-profiling concept
    beyond emotion recognition to inference-based profiling at large.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  mappings:
  - framework: eu_ai_act
    target_id: article-5-1f
    target_label: Article 5(1)(f) — emotion recognition in workplace and education (prohibited)
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-5-1g
    target_label: Article 5(1)(g) — biometric categorization for sensitive attributes
    relation: closeMatch
  - framework: air_2024
    target_id: L3-PrivacyViolations-Sensitive
    target_label: Privacy → Sensitive attribute profiling
    relation: closeMatch
- id: privacy-data-protection
  type: subgroup
  broader: privacy-confidentiality
  label: Data protection
  definition: Risks related to safeguards for stored and processed personal data.
  mappings:
  - framework: nist_600
    target_id: '4'
    target_label: Data Privacy
    relation: closeMatch
  - framework: iso_42001
    target_id: A.7.5
    target_label: Privacy considerations for AI systems
    relation: closeMatch
  - framework: aiuc1
    target_id: A.5
    target_label: Implement customer data policies
    relation: closeMatch
- id: weak-data-controls
  type: subcategory
  broader: privacy-data-protection
  maturity: established
  label: Weak data retention, erasure, and access controls
  definition: 'Insufficient policies or technical measures for data retention limits, secure deletion,
    and access restrictions, increasing the risk of unauthorized access or indefinite data persistence.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
  mappings:
  - framework: iso_42001
    target_id: A.7.5
    target_label: Privacy considerations for AI systems
    relation: closeMatch
  - framework: aiuc1
    target_id: A.5
    target_label: Implement customer data policies
    relation: closeMatch
- id: re-identification
  type: subcategory
  broader: privacy-data-protection
  maturity: established
  label: Re-identification of anonymised data
  definition: 'The possibility that anonymised or pseudonymised data can be linked back to specific individuals
    through inference, combination with other datasets, or model outputs.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
  mappings:
  - framework: dpv_ai
    target_id: Reidentification
    target_label: Re-identification
    target_url: https://w3c.github.io/dpv/2.3/risk/#Reidentification
    relation: exactMatch
  - framework: mit
    target_id: subdomain-2.1
    target_label: Compromise of privacy by inferring sensitive information
    relation: closeMatch
  - framework: nist_600
    target_id: data-privacy
    target_label: Data Privacy (de-anonymization clause)
    relation: narrowMatch
- id: privacy-model-level
  type: subgroup
  broader: privacy-confidentiality
  label: Model-level privacy
  definition: Risks from AI models leaking or exposing private information through their outputs or structure.
  mappings:
  - framework: mit
    target_id: subdomain-2.1
    target_label: Compromise of privacy by obtaining, leaking or inferring sensitive information
    relation: closeMatch
  - framework: dpv_ai
    target_id: MembershipInferenceAttack
    target_label: Membership Inference Attack
    target_url: https://w3c.github.io/dpv/2.3/ai/#MembershipInferenceAttack
    relation: closeMatch
  references:
  - label: OpenAI Privacy Filter
    url: https://github.com/openai/privacy-filter
    type: tool
    note: Open-source tool for detecting and filtering personally identifiable information in LLM inputs
      and outputs.
- id: sensitive-information-leakage
  type: subcategory
  broader: privacy-model-level
  maturity: established
  label: Sensitive information leakage through model outputs
  alt_labels:
  - PII leakage rate
  - Privacy leakage
  definition: Personal or confidential/proprietary information present in training data, inference-time
    context, or connected systems, surfacing in model outputs through memorisation, context disclosure,
    cross-tenant contamination, or system-prompt extraction. Broadens the former pii-leakage (personal
    data only) to also cover organisational and commercial confidentiality (the former confidential-information-leakage,
    retired and absorbed here).
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
  mappings:
  - framework: mit
    target_id: subdomain-2.1
    target_label: Compromise of privacy by leaking or inferring sensitive information
    relation: exactMatch
  - framework: nist_600
    target_id: data-privacy
    target_label: Data Privacy (leakage clause)
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-15-5
    target_label: Article 15(5) — cybersecurity (confidentiality attacks)
    relation: narrowMatch
  - framework: dpv_ai
    target_id: UnauthorisedDataDisclosure
    target_label: Unauthorised Data Disclosure
    target_url: https://w3c.github.io/dpv/2.3/risk/#UnauthorisedDataDisclosure
    relation: closeMatch
  - framework: aiuc1
    target_id: A.6
    target_label: Prevent PII leakage
    relation: exactMatch
  - framework: air_2024
    target_id: L3-PrivacyViolations-PII
    target_label: Privacy → Unauthorized Privacy Violations × PII
    relation: exactMatch
  - framework: ibm_atlas
    target_id: personal-information-output
    target_label: Output → Revealing personal information in output
    relation: exactMatch
- id: reliability
  type: category
  label: Reliability
  alt_labels:
  - Validity and Reliability
  definition: Risks arising from an AI systems failure to perform dependably — whether through degraded
    output integrity and robustness (e.g., hallucinations, model drift), or through inability to maintain
    function under adverse or changing conditions (e.g., infrastructure failure, connectivity loss).
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: technical soundness
  mappings:
  - framework: mit
    target_id: subdomain-7.3
    target_label: Lack of capability or robustness
    relation: closeMatch
  - framework: mit
    target_id: domain-3
    target_label: Misinformation
    relation: broadMatch
  - framework: nist_600
    target_id: '2'
    target_label: Confabulation
    relation: closeMatch
  - framework: nist_600
    target_id: '8'
    target_label: Information Integrity
    relation: closeMatch
    citation: Information Integrity covers non-adversarial spread of inaccurate information; close match
      with scope note — also covers content provenance which overlaps with Transparency.
  - framework: nist_rmf
    target_id: valid-reliable
    target_label: Valid & Reliable
    relation: closeMatch
  - framework: oecd
    target_id: robustness
    target_label: Robustness, security & safety
    relation: broadMatch
  - framework: eu_ai_act
    target_id: article-15
    target_label: Article 15 — accuracy, robustness and cybersecurity
    relation: closeMatch
  - framework: iso_42001
    target_id: A.6.2.4
    target_label: AI system verification and validation
    relation: closeMatch
  - framework: aiuc1
    target_id: D
    target_label: Reliability domain
    relation: exactMatch
  - framework: air_2024
    target_id: L1-SystemOperational
    target_label: System & Operational Risks (L1)
    relation: broadMatch
  - framework: ibm_atlas
    target_id: output-robustness
    target_label: Output → Robustness + Inference → Accuracy
    relation: closeMatch
