- id: agentic-ai
  type: category
  label: Agentic AI
  alt_labels:
  - AI Agents
  - Agentic risks
  definition: Risks arising from AI systems that autonomously plan, reason, and act across multiple steps
    using tools, memory, and external services, beyond single-inference interactions. These risks are
    distinct from standard LLM risks because the agent takes real-world actions, operates across time,
    and interacts with external systems and other agents.
  scope: LLM
  lifecycle_stages:
  - post-processing
  maturity: established
  perspective: technical soundness
  note: 'Initial scope deliberately limited to primary enterprise risks of agentic deployment. Adversarial
    threats specific to agents (e.g., memory poisoning) are not yet included — they sit closer to security
    and will be revisited as the category matures. Loss of meaningful human control over agentic systems
    is currently covered under Autonomy & Agency / System autonomy and may be promoted or cross-referenced
    here in a future iteration. Some overlap with Autonomy & Agency / System autonomy is acknowledged
    and will be reconciled in a future minor version.

    '
  mappings:
  - framework: csa_agentic_profile
    target_id: AG-MP.2-AG-MP.3-AG-GV.2
    target_label: AG-MP.3 (Multi-Agent Topology Risk) + AG-MP.2 (Agent Action-Consequence Analysis) +
      AG-GV.2 (Delegation Accountability)
    relation: closeMatch
    citation: The CSA Agentic Profile categories cover the same risk surface as Eticas Agentic AI — multi-agent
      topology, action-consequence analysis, and delegation accountability — at the GOVERN/MAP function
      level of the NIST RMF.
  - framework: owasp_agentic_top10
    target_id: ASI01-ASI02-ASI03
    target_label: ASI01 (Agent Goal Hijack) + ASI02 (Tool Misuse and Exploitation) + ASI03 (Identity and
      Privilege Abuse)
    relation: closeMatch
    citation: ASI02 covers Eticas unsafe-tool-calls and excessive-agency; ASI01 covers scope-creep-goal-misalignment;
      ASI03 covers excessive-agency from the identity/privilege angle. Memory poisoning (ASI06) is deliberately
      out of scope at v1.2 (see category note).
  - framework: ibm_atlas
    target_id: agentic-explainability-robustness-efficiency
    target_label: New and amplified risks of agentic AI — Explainability, Robustness, Computational Inefficiency
    relation: closeMatch
    citation: IBM Risk Atlas explicitly identifies Explainability, Robustness, and Computational Inefficiency
      as new and amplified risks introduced by agentic AI deployment patterns; covers untraceable-agent-actions,
      function-calling-hallucination, and redundant-actions respectively.
- id: agentic-actions-tool-use
  type: subgroup
  broader: agentic-ai
  label: Autonomous Actions and Tool Use
  definition: Risks from the agent taking real-world actions through external tools, APIs, and services,
    including being granted excessive permissions, executing unnecessary or out-of-scope actions, bypassing
    human oversight, or consuming disproportionate resources.
- id: unsafe-tool-calls
  type: subcategory
  broader: agentic-actions-tool-use
  maturity: established
  label: Unsafe or unauthorised tool calls
  definition: 'The agent invokes tools, APIs, or services beyond its intended scope — for example, calling
    the wrong tool, calling a tool with incorrect parameters, or accessing systems it was not designed
    to interact with.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
- id: function-calling-hallucination
  type: subcategory
  broader: agentic-actions-tool-use
  maturity: established
  label: Function calling hallucination
  definition: 'The agent generates incorrect or malformed function calls — for example, by specifying
    wrong parameters, calling non-existent tools, or misinterpreting tool schemas — causing downstream
    failures or unintended system interactions.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
- id: excessive-agency
  type: subcategory
  broader: agentic-actions-tool-use
  maturity: established
  label: Excessive agency
  definition: 'A configuration risk rather than an action risk: the agent has been granted more permissions,
    capabilities, or access rights than necessary for its defined task, expanding the potential damage
    of any failure or attack.

    '
  scope: LLM
  lifecycle_stages:
  - pre-processing
  - post-processing
- id: scope-creep-goal-misalignment
  type: subcategory
  broader: agentic-actions-tool-use
  maturity: established
  label: Scope creep and goal misalignment
  definition: 'The agent pursues its objective in ways that exceed intended boundaries, develop unintended
    sub-goals, or conflict with user intent — driven by ambiguous instructions, reward misspecification,
    or emergent planning behaviour across multiple steps.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
- id: agentic-multi-agent-integrity
  type: subgroup
  broader: agentic-ai
  label: Multi-agent Integrity
  definition: Risks from systems composed of multiple agents — including trust exploitation, cascading
    failures, goal misalignment between agents, and insufficient traceability across the pipeline.
- id: trust-exploitation-between-agents
  type: subcategory
  broader: agentic-multi-agent-integrity
  maturity: established
  label: Trust exploitation between agents
  definition: 'A compromised or malicious agent manipulates other agents in a pipeline by exploiting implicit
    trust in inter-agent communication, passing false instructions, forged outputs, or poisoned context
    to downstream agents.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
- id: untraceable-agent-actions
  type: subcategory
  broader: agentic-multi-agent-integrity
  maturity: established
  label: Unexplainable and untraceable actions
  definition: 'Agent actions across multi-step pipelines cannot be reconstructed, explained, or attributed,
    making it impossible to audit what the agent did, in what order, and why. Includes loss of data provenance
    — for example, the agent loses track of the origin and reliability of retrieved data, making factual
    claims unverifiable.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
