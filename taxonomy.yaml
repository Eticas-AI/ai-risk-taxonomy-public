concepts:
- id: bias-fairness
  type: category
  label: Bias & Fairness
  alt_labels:
  - Fairness
  - Bias & Discrimination
  - Algorithmic fairness
  definition: 'The risk that an AI system produces outcomes that systematically advantage or disadvantage
    individuals or groups based on protected or sensitive attributes, leading to unequal treatment, reduced
    accuracy, or unjust impacts. This includes biases introduced through data, model design, or deployment
    context, and covers both measurable disparities and perceived unfairness in decision-making.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: rights & ethics
  mappings:
  - framework: mit
    target_id: domain-1
    target_label: Discrimination & Toxicity
    relation: closeMatch
    citation: Risks related to unfair treatment, harmful content exposure, and unequal AI performance
      across different groups.
  - framework: nist_600
    target_id: harmful-bias
    target_label: §2.6 Harmful Bias and Homogenization
    relation: closeMatch
    citation: Amplification and exacerbation of historical, societal, and systemic biases; performance
      disparities and homogenization of outputs.
  - framework: nist_rmf
    target_id: fair
    target_label: Fair with Harmful Bias Managed + Map 5.1 + Measure 2.11
    relation: closeMatch
    citation: Fairness in AI includes concerns for equality and equity by addressing issues such as harmful
      bias and discrimination.
  - framework: eu_ai_act
    target_id: article-10-5-annex-iii
    target_label: Article 10(5) + Article 6(2) + Annex III — bias-relevant data governance and high-risk
      classification
    relation: closeMatch
    citation: Art. 10(5) on special categories of personal data; Art. 6(2) and Annex III define high-risk
      uses where bias is the primary concern.
  - framework: oecd
    target_id: principle-1.2
    target_label: Human rights, rule of law, fairness & privacy
    relation: broadMatch
    citation: Principle 1.2 covers fairness alongside rights-based concerns. Bias is not separately enumerated.
  - framework: dpv_ai
    target_id: AIBias
    target_label: AI Bias
    target_url: https://w3c.github.io/dpv/2.3/ai/#AIBias
    relation: closeMatch
    citation: Bias associated with development, use, or other activities involving an AI technology or
      system. (DPV AI extension)
  - framework: iso_42001
    target_id: A.7.4
    target_label: A.7.4 — Data for AI systems
    relation: narrowMatch
    citation: A.7.4 sets criteria for data sources and treatment of bias in data used by AI systems.
  - framework: aiuc1
    target_id: C.3-C.4-C.6
    target_label: C.3 + C.4 + C.6 — safeguards to prevent harmful and vulnerable outputs
    relation: relatedMatch
    citation: C.3/C.4/C.6 prevent harmful outputs; AIUC-1 has no dedicated bias/fairness domain.
  - framework: air_2024
    target_id: L1-LegalRightsRelated
    target_label: Legal & Rights-Related Risks (3.1.D)
    relation: broadMatch
    citation: AIR places bias under Legal & Rights-Related Risks; other sub-sections also apply.
  - framework: ibm_atlas
    target_id: output-fairness-and-training-data
    target_label: Output → Fairness + Training data → Accuracy + Fairness
    relation: closeMatch
    citation: IBM Atlas covers bias at Output (Fairness dimension) and Training data (Accuracy + Fairness)
      stages.
  - framework: tc260
    target_id: 3.1.1b-3.3.2a
    target_label: §3.1.1(b) Model and algorithm risks (bias/discrimination) + §3.3.2(a) Ethical risks
      (systemic social discrimination)
    relation: closeMatch
    citation: TC260 identifies bias introduced through models/algorithms and data-driven social discrimination
      as risks under Endogenous and Derivative categories respectively.
  - framework: coe_ai_convention
    target_id: article-10
    target_label: Article 10 — Equality and non-discrimination
    relation: closeMatch
    citation: The Convention requires parties to take measures to address discrimination risks from AI
      systems.
  - framework: ieee_7003
    target_id: clause-7-and-9
    target_label: Clauses 7 & 9 — Data Representation; Evaluation
    relation: closeMatch
    citation: The bias profile process (Clauses 4–9) treats algorithmic bias transversally; Clause 7 covers
      data-driven bias spanning outcome disparities, representational harm (demographic skew, stereotyping)
      and dynamic/systemic patterns, and Clause 9 defines methods to evaluate bias in AIS design and outputs
      across stakeholder groups.
- id: geographic-cultural-language-skew
  type: subcategory
  broader: bias-representational-harm
  maturity: established
  label: Geographic, cultural, or language skew
  definition: 'Systematic performance differences across geographies, cultures, or languages, often resulting
    from training data that overrepresents certain regions or linguistic traditions.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  mappings:
  - framework: mit
    target_id: subdomain-1.1
    target_label: Unfair discrimination & misrepresentation
    relation: narrowMatch
  - framework: nist_600
    target_id: harmful-bias
    target_label: Harmful Bias & Homogenization
    relation: narrowMatch
  - framework: dpv_ai
    target_id: NonRepresentativeSamplingBias
    target_label: Non-Representative Sampling Bias
    target_url: https://w3c.github.io/dpv/2.3/ai/#NonRepresentativeSamplingBias
    relation: closeMatch
- id: feedback-loops
  type: subcategory
  broader: bias-dynamic-systemic-bias
  maturity: established
  label: Feedback loops reinforcing inequality
  definition: 'System outputs that, when fed back into the system or its operational context, amplify
    existing biases over time.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  mappings:
  - framework: nist_rmf
    target_id: systemic-bias
    target_label: Systemic bias under harmful bias
    relation: narrowMatch
  - framework: iso_42001
    target_id: A.6.2.6
    target_label: AI system operation and monitoring
    relation: closeMatch
  - framework: ibm_atlas
    target_id: societal-impact-drift
    target_label: Output → Drift + Non-technical → Societal impact
    relation: closeMatch
- id: bias-outcome-disparities
  type: subgroup
  broader: bias-fairness
  label: Outcome disparities
  definition: Risks related to unequal treatment, allocation, or performance outcomes across demographic
    and protected groups. These are observable differences in what the system does to or for different
    groups.
  mappings:
  - framework: mit
    target_id: subdomain-1.3
    target_label: Unequal performance across groups
    relation: exactMatch
  - framework: nist_600
    target_id: harmful-bias
    target_label: Harmful Bias & Homogenization
    relation: broadMatch
  - framework: nist_rmf
    target_id: manage-2.3
    target_label: Manage 2.3 — allocation harms and disparate performance
    relation: closeMatch
  - framework: eu_ai_act
    target_id: annex-iii
    target_label: Annex III high-risk uses (employment, education, essential services)
    relation: closeMatch
  - framework: dpv_ai
    target_id: DataBias
    target_label: Data Bias
    target_url: https://w3c.github.io/dpv/2.3/ai/#DataBias
    relation: broadMatch
  - framework: iso_42001
    target_id: A.5.2
    target_label: AI system impact assessment
    relation: closeMatch
  - framework: aiuc1
    target_id: C.5
    target_label: Prevent customer-defined high-risk outputs
    relation: narrowMatch
  - framework: air_2024
    target_id: L2-DiscriminationBias
    target_label: Discrimination & Bias (Discriminatory Activities)
    relation: closeMatch
  - framework: ibm_atlas
    target_id: output-bias
    target_label: Output bias (Fairness dimension)
    relation: exactMatch
- id: disparate-impact-protected-groups
  type: subcategory
  broader: bias-outcome-disparities
  maturity: established
  label: Disparate impact on protected groups
  definition: The system produces systematically different — typically worse — outcomes for individuals
    belonging to protected groups, including across multiple intersecting attributes (race, gender, age,
    disability, etc.). Encompasses unequal allocation of opportunity, quality of service disparities,
    intersectional unfairness, and accessibility barriers.
  scope: ALL
  lifecycle_stages:
  - post-processing
  alt_labels:
  - Disparate impact
  - Quality of service disparity
  - Allocation of opportunity
  - Intersectional unfairness
  - Accessibility barriers
  mappings:
  - framework: mit
    target_id: subdomain-1.1
    target_label: Unfair discrimination and misrepresentation
    relation: closeMatch
  - framework: mit
    target_id: subdomain-1.3
    target_label: Unequal performance across groups
    relation: closeMatch
  - framework: nist_600
    target_id: harmful-bias
    target_label: Harmful Bias & Homogenization
    relation: broadMatch
  - framework: nist_rmf
    target_id: harmful-bias
    target_label: Harmful bias / disparate performance
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-5-1c
    target_label: Article 5(1)(c) — prohibited social scoring
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-10
    target_label: Article 10 — data and data governance
    relation: closeMatch
  - framework: dpv_ai
    target_id: Discrimination
    target_label: Discrimination
    target_url: https://w3c.github.io/dpv/2.3/risk/#Discrimination
    relation: closeMatch
  - framework: iso_42001
    target_id: A.5.2
    target_label: AI system impact assessment
    relation: closeMatch
  - framework: air_2024
    target_id: L2-DiscriminationBias-protected
    target_label: Discrimination & Bias × Protected Characteristics (60 Level-4 risks)
    relation: closeMatch
  - framework: ibm_atlas
    target_id: output-fairness
    target_label: Output → Fairness dimension
    relation: closeMatch
- id: bias-representational-harm
  type: subgroup
  broader: bias-fairness
  label: Representational harm
  definition: Risks related to how the system represents groups in its outputs — through stereotypes,
    toxic content, skewed representation, or homogenization. These are harms in the form of meaning and
    content rather than allocation of resources or opportunities.
  mappings:
  - framework: mit
    target_id: subdomain-1.1
    target_label: Unfair discrimination & misrepresentation
    relation: closeMatch
  - framework: nist_600
    target_id: harmful-bias
    target_label: Harmful Bias & Homogenization (representational dimension)
    relation: narrowMatch
  - framework: nist_rmf
    target_id: harmful-bias
    target_label: Harmful bias (representational dimension)
    relation: narrowMatch
  - framework: dpv_ai
    target_id: NonRepresentativeSamplingBias
    target_label: Non-Representative Sampling Bias
    target_url: https://w3c.github.io/dpv/2.3/ai/#NonRepresentativeSamplingBias
    relation: narrowMatch
  - framework: ibm_atlas
    target_id: toxicity-harmful-output
    target_label: Output → Toxicity / Harmful output
    relation: narrowMatch
- id: bias-dynamic-systemic-bias
  type: subgroup
