    target_url: https://w3c.github.io/dpv/2.3/ai/#AutomationBias
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.5
    target_label: Accountability — lifecycle bias monitoring
    relation: closeMatch
  - framework: iso_42001
    target_id: A.6.2.6
    target_label: AI system operation and monitoring
    relation: closeMatch
  - framework: aiuc1
    target_id: C.8
    target_label: Monitor AI risk categories
    relation: relatedMatch
  - framework: mit
    target_id: subdomain-6.5
    target_label: Governance failure
